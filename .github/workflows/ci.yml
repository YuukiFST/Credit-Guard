# CI — Lint, Testes e Validação de Modelo

name: CI — Qualidade e Testes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint + Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala uv
        run: pip install uv

      - run: uv pip install --system ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports

  tests:
    name: Testes + Cobertura
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala uv
        run: pip install uv

      - run: uv pip install --system -r requirements.txt -r requirements-dev.txt

      - name: Executar testes
        # Usa addopts do pyproject.toml (inclui cov-fail-under alinhado ao projeto)
        run: pytest --cov-report=xml

      - name: Upload coverage para Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

